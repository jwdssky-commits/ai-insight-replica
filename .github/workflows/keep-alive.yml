name: keep-alive

on:
  schedule:
    - cron: '17 3 * * 0'  # 每周日 UTC 03:17 = 北京时间 11:17

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Touch keep-alive marker
        run: |
          # 更新时间戳文件，保持仓库活跃
          mkdir -p data
          echo "{\"last_keepalive\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/.keep-alive.json
          git config user.name "AI手札 Bot"
          git config user.email "bot@ai-shouzha.github.io"
          git add data/.keep-alive.json
          git diff --cached --quiet && echo "No changes needed" && exit 0
          git commit -m "chore: keep-alive $(date -u +%Y-%m-%d)"
          git push origin main
