name: daily-update

on:
  schedule:
    - cron: '26 22 * * *'  # UTC 22:26 = 北京时间 06:26
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD)'
        required: false
        default: ''
  repository_dispatch:
    types: [trigger-daily-update]

permissions:
  contents: write
  actions: write

jobs:
  generate-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Run orchestrator
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            # 北京时间 06:30 = UTC 22:30(前一天), 日报标注前一天日期
            DATE=$(TZ=Asia/Shanghai date -d 'yesterday' +%Y-%m-%d)
          fi
          python scripts/orchestrator.py --date "$DATE"

      - name: Commit and push
        run: |
          git config user.name "AI手札 Bot"
          git config user.email "bot@ai-shouzha.github.io"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "daily: $(date +%Y-%m-%d) auto-update"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retrying ($i/3)..."
            sleep 5
          done
          echo "HAS_CHANGES=true" >> $GITHUB_ENV

      - name: Upload state for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-${{ github.run_id }}
          path: |
            data/daily-workflow/
            data/flags/
          retention-days: 14

      - name: Trigger deploy
        if: env.HAS_CHANGES == 'true'
        run: |
          gh workflow run deploy-pages.yml
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "Daily update failed! Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
